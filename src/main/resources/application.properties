spring.application.name=tttn

# MySQL datasource
spring.datasource.url=${DB_URL:jdbc:mysql://tttn1-student-1474.g.aivencloud.com:17400/defaultdb?sslMode=REQUIRED&enabledTLSProtocols=TLSv1.2&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
