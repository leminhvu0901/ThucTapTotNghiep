<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử mua hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/user">Văn phòng phẩm Online</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/user">Sản phẩm</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/giohang">Giỏ hàng</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="/user/lichsu">Lịch sử mua hàng</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/thanhtoan">Thanh toán</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5 mb-5">
    <h2 class="mb-4">Lịch sử mua hàng</h2>
    <div th:if="${orders.empty}">
        <div class="alert alert-info">Bạn chưa có đơn hàng nào.</div>
        <a href="/user" class="btn btn-primary">Tiếp tục mua sắm</a>
    </div>
    <div th:if="${!orders.empty}">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID đơn</th>
                    <th>Ngày đặt</th>
                    <th>Người nhận</th>
                    <th>Số sản phẩm</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderId}">0</td>
                    <td th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : '-'}">--</td>
                    <td th:text="${order.user != null ? order.user.fullName : '---'}">Tên khách</td>
                    <td th:text="${order.user != null ? order.user.phone : '---'}">Số điện thoại</td>
                    <td th:text="${order.user != null ? order.user.address : '---'}">Địa chỉ</td>
                    <td th:text="${order.totalAmount}">0</td>
                    <td th:text="${order.status}">pending</td>
                </tr>
            </tbody>
        </table>
        <a href="/user" class="btn btn-primary">Tiếp tục mua sắm</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
