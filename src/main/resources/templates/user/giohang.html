<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/user">Văn phòng phẩm Online</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/user">Sản phẩm</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/lichsu">Lịch sử mua hàng</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/thanhtoan">Thanh toán</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2>Giỏ hàng của bạn</h2>
    <div th:if="${cartItems.empty}">
        <div class="alert alert-info">Giỏ hàng hiện đang trống. Hãy chọn sản phẩm.</div>
        <a href="/user" class="btn btn-primary">Tiếp tục mua sắm</a>
    </div>
    <div th:if="${!cartItems.empty}">
        <table class="table table-bordered align-middle mt-3">
            <thead class="table-light">
                <tr>
                    <th scope="col">Sản phẩm</th>
                    <th scope="col">Đơn giá</th>
                    <th scope="col">Số lượng</th>
                    <th scope="col">Thành tiền</th>
                    <th scope="col">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <img th:src="${item.product.image}" 
                                style="width: 80px; height: 80px; object-fit: cover;" 
                                class="rounded" 
                                onerror="this.src='https://via.placeholder.com/80x80?text=No+Image'" />
                            <div>
                                <strong th:text="${item.product.productName}">Tên sản phẩm</strong>
                            </div>
                        </div>
                    </td>
                    <td th:text="${item.product.price}">0</td>
                    <td th:text="${item.quantity}">0</td>
                    <td th:text="${item.product.price * item.quantity}">0</td>
                    <td>
                        <form th:action="@{/user/giohang/remove}" method="post">
                            <input type="hidden" name="productId" th:value="${item.product.productId}" />
                            <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                        </form>
                    </td>
                </tr>
            </tbody>

        </table>
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <a href="/user" class="btn btn-outline-secondary">Tiếp tục mua sắm</a>
            </div>
            <div class="text-end">
                <p class="mb-1">Tổng tiền:</p>
                <h4 class="text-danger" th:text="${cartTotal}">0</h4>
                <a href="/user/thanhtoan" class="btn btn-success">Tiến hành thanh toán</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
