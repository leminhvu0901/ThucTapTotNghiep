<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/user">Văn phòng phẩm Online</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/user">Sản phẩm</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/giohang">Giỏ hàng</a></li>
                <li class="nav-item"><a class="nav-link" href="/user/lichsu">Lịch sử mua hàng</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5 mb-5">
    <h2 class="mb-4">Thông tin đặt hàng</h2>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div class="row">
        <div class="col-lg-6">
            <div class="card shadow-lg border-0 p-4">
                <h5 class="mb-4">Thông tin người nhận</h5>
                <form th:action="@{/user/thanhtoan}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" class="form-control form-control-lg" name="fullName" th:value="${user.fullName}" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control form-control-lg" name="email" th:value="${user.email}" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="text" class="form-control form-control-lg" name="phone" th:value="${user.phone}" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ</label>
                        <textarea class="form-control form-control-lg" name="address" rows="4" required th:text="${user.address}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100">Xác nhận đặt hàng</button>
                </form>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-body">
                    <h5 class="card-title mb-4">Tóm tắt đơn hàng</h5>
                    
                    <!-- Danh sách sản phẩm -->
                    <div class="mb-4" th:if="${!cartItems.empty}">
                        <h6 class="fw-bold mb-3">Sản phẩm:</h6>
                        <table class="table table-sm table-borderless">
                            <tbody>
                                    <tr th:each="item : ${cartItems}">
                                        <td th:text="${item.product.productName}">Sản phẩm</td>
                                        <td class="text-end">x<span th:text="${item.quantity}">1</span></td>
                                        <td class="text-end fw-bold"
                                             th:text="${item.product.price.multiply(T(java.math.BigDecimal).valueOf(item.quantity.longValue()))}">0đ</td>

                                    </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <hr />
                    
                    <!-- Tóm tắt -->
                    <div class="mb-3">
                        <p class="mb-1">Số sản phẩm: <strong th:text="${cartItems.size()}">0</strong></p>
                    </div>
                    
                    <div class="alert alert-info mb-0">
                        <p class="mb-0">Tổng tiền phải trả:</p>
                        <h4 class="text-danger fw-bold mb-0" th:text="${cartTotal}">0đ</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
