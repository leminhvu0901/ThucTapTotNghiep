<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Quản lý đơn hàng</title>
        <link rel="icon" type="image/x-icon" th:href="@{/admin/assets/favicon.ico}" href="/admin/assets/favicon.ico" />
        <link th:href="@{/admin/css/styles.css}" href="/admin/css/styles.css" rel="stylesheet" />

    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar -->
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light">
                    <a href="/admin" class="text-decoration-none fw-bold">TRANG CHỦ ADMIN</a>
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item  list-group-item-light p-3" href="/admin/sanpham">Sản phẩm</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3 active" href="/admin/donhang">Đơn hàng</a>
                </div>
            </div>

            <div id="page-content-wrapper">
                <div class="container-fluid py-4">
                    <div class="d-flex justify-content-around align-items-center mb-4">
                        <h4 class="mb-0 fw-bold">Quản lý đơn hàng</h4>
                        <span class="fw-bold text-danger" th:text="${'Tổng: ' + #lists.size(orders) + ' đơn'}"></span>
                    </div>

                    <div class="alert alert-success rounded-3" role="alert" th:if="${message}" th:text="${message}"></div>
                    <div class="alert alert-danger rounded-3" role="alert" th:if="${error}" th:text="${error}"></div>

                    <div class="card border-0 shadow-xl rounded-3">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="px-4">Mã đơn</th>
                                        <th>Khách hàng</th>
                                        <th>Ngày đặt</th>
                                        <th class="text-end">Tổng tiền</th>
                                        <th class="text-center">Trạng thái</th>
                                        <th class="text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(orders)}">
                                        <td class="text-center py-5 text-muted" colspan="6">Chưa có đơn hàng nào.</td>
                                    </tr>
                                    <tr th:each="order : ${orders}">
                                        <td class="px-4 fw-semibold" th:text="${'#' + order.orderId}"></td>
                                        <td th:text="${order.user != null ? (order.user.fullName != null ? order.user.fullName : order.user.username) : 'N/A'}"></td>
                                        <td th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                                        <td class="text-end fw-semibold"
                                            th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}">
                                        </td>
                                        <td class="text-center">
                                            <span class="badge-status"
                                                th:classappend="${order.status.name() == 'pending'   ? 'bg-warning text-dark' :
                                                                 order.status.name() == 'confirmed'  ? 'bg-primary text-white' :
                                                                 order.status.name() == 'shipping'   ? 'bg-info text-dark' :
                                                                 order.status.name() == 'completed'  ? 'bg-success text-white' :
                                                                                                       'bg-danger text-white'}"
                                                th:text="${order.status.name() == 'pending'   ? 'Chờ xử lý' :
                                                           order.status.name() == 'confirmed'  ? 'Đã xác nhận' :
                                                           order.status.name() == 'shipping'   ? 'Đang giao hàng' :
                                                           order.status.name() == 'completed'  ? 'Hoàn thành' :
                                                                                                  'Đã hủy'}">
                                            </span>
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-primary px-3"
                                               th:href="@{|/admin/donhang/${order.orderId}|}">
                                                Chi tiết
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/admin/js/scripts.js}" src="/admin/js/scripts.js"></script>
    </body>
</html>
