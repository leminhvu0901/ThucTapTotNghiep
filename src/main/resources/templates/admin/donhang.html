<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>DON HANG </title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" th:href="@{/admin/assets/favicon.ico}" href="/admin/assets/favicon.ico" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link th:href="@{/admin/css/styles.css}" href="/admin/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar-->
            <div class="border-end bg-white" id="sidebar-wrapper">
                 <div class="sidebar-heading border-bottom bg-light "  >
                    <a href="/admin" class="text-decoration-none"> TRANG CHU ADMIN</a>
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/sanpham">Sản phẩm </a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/donhang">Đơn hàng</a>
                </div>
            </div>
            <!-- Page content wrapper-->
            <div id="page-content-wrapper">
                <!-- Top navigation-->
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="sidebarToggle"> Thu gọn </button>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                        
                    </div>
                </nav>
                <!-- Page content-->
                <div class="container-fluid py-4">
                    <h1 class="mb-4">QUAN LY DON HANG</h1>

                    <div class="alert alert-success" role="alert" th:if="${message}" th:text="${message}"></div>
                    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <strong>DANH SACH DON HANG</strong>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Khach hang</th>
                                        <th>Ngay dat</th>
                                        <th>Tong tien</th>
                                        <th>Trang thai hien tai</th>
                                        <th>Cap nhat trang thai</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(orders)}">
                                        <td class="text-center py-4" colspan="6">Chua co don hang nao.</td>
                                    </tr>
                                    <tr th:each="order : ${orders}">
                                        <td th:text="${order.orderId}">1</td>
                                        <td th:text="${order.user != null ? (order.user.fullName != null ? order.user.fullName : order.user.username) : 'N/A'}">Khach hang</td>
                                        <td th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                                        <td th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 1, 2) : '0.00'}">0.00</td>
                                        <td>
                                            <span class="badge text-bg-secondary" th:text="${order.status}">pending</span>
                                        </td>
                                        <td>
                                            <form class="d-flex gap-2" method="post" th:action="@{|/admin/donhang/${order.orderId}/trangthai|}">
                                                <select class="form-select form-select-sm" name="status">
                                                    <option
                                                        th:each="status : ${orderStatuses}"
                                                        th:selected="${status == order.status}"
                                                        th:text="${status}"
                                                        th:value="${status}">
                                                    </option>
                                                </select>
                                                <button class="btn btn-sm btn-primary text-nowrap" type="submit">Luu</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script th:src="@{/admin/js/scripts.js}" src="/admin/js/scripts.js"></script>
    </body>
</html>
