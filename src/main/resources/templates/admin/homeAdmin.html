<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>Trang chủ Admin</title>
        <link
            rel="icon"
            type="image/x-icon"
            th:href="@{/admin/assets/favicon.ico}"
            href="/admin/assets/favicon.ico"
        >
        <link th:href="@{/admin/css/styles.css}" href="/admin/css/styles.css" rel="stylesheet">
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar -->
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light">
                    <a href="/admin" class="text-decoration-none">TRANG CHỦ ADMIN</a>
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/sanpham">Sản phẩm</a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/donhang">Đơn hàng</a>
                </div>
            </div>
            <div class="container-fluid py-4">
                <h4 class="fw-bold mb-4">Tổng quan</h4>
                <div class="row g-3 mb-4">
                    <div class="col-6 col-xl-3">
                        <div class="card border-0 shadow-sm stat-card blue h-100">
                            <div class="card-body">
                                <div class="stat-label">Tổng sản phẩm</div>
                                <div class="stat-num text-primary" th:text="${totalProducts}">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-xl-3">
                        <div class="card border-0 shadow-sm stat-card green h-100">
                            <div class="card-body">
                                <div class="stat-label">Tổng đơn hàng</div>
                                <div class="stat-num text-success" th:text="${totalOrders}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Trạng thái đơn hàng -->
                <h6 class="fw-semibold text-muted mb-3">Đơn hàng theo trạng thái</h6>
                <div class="row g-3">
                    <div class="col-6 col-md-4 col-xl-2">
                        <div class="card border-0 shadow-sm stat-card yellow h-100">
                            <div class="card-body">
                                <div class="stat-label">Chờ xử lý</div>
                                <div class="stat-num text-warning" th:text="${pendingOrders}">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl-2">
                        <div class="card border-0 shadow-sm stat-card blue h-100">
                            <div class="card-body">
                                <div class="stat-label">Đã xác nhận</div>
                                <div class="stat-num text-primary" th:text="${confirmedOrders}">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl-2">
                        <div class="card border-0 shadow-sm stat-card cyan h-100">
                            <div class="card-body">
                                <div class="stat-label">Đang giao</div>
                                <div class="stat-num text-info" th:text="${shippingOrders}">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl-2">
                        <div class="card border-0 shadow-sm stat-card green h-100">
                            <div class="card-body">
                                <div class="stat-label">Hoàn thành</div>
                                <div class="stat-num text-success" th:text="${completedOrders}">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-4 col-xl-2">
                        <div class="card border-0 shadow-sm stat-card red h-100">
                            <div class="card-body">
                                <div class="stat-label">Đã hủy</div>
                                <div class="stat-num text-danger" th:text="${cancelledOrders}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/admin/js/scripts.js}" src="/admin/js/scripts.js"></script>
    </body>
</html>
