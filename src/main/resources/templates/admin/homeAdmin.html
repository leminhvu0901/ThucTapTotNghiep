<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>TRANG CHU </title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" th:href="@{/admin/assets/favicon.ico}" href="/admin/assets/favicon.ico" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link th:href="@{/admin/css/styles.css}" href="/admin/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar-->
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light" >
                    <a href="/admin" class="text-decoration-none"> TRANG CHU ADMIN</a>
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/sanpham">Sản phẩm </a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/donhang">Đơn hàng</a>
                </div>
            </div>
            <!-- Page content wrapper-->
            <div id="page-content-wrapper">
                <!-- Top navigation-->
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom" >
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="sidebarToggle"> Thu gọn </button>                       
                    </div>
                </nav>
                <!-- Page content-->
                <div class="container-fluid py-4">
                    <h1 class="mb-4">TRANG CHU ADMIN</h1>
                    <div class="row g-3">
                        <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Tong san pham</p>
                                    <h2 class="mb-0" th:text="${totalProducts}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Tong don hang</p>
                                    <h2 class="mb-0" th:text="${totalOrders}">0</h2>
                                </div>
                            </div>
                        </div>
                        <hr>
                        <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Don cho xu ly</p>
                                    <h2 class="mb-0" th:text="${pendingOrders}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Don da xac nhan</p>
                                    <h2 class="mb-0" th:text="${confirmedOrders}">0</h2>
                                </div>
                            </div>
                        </div>
                         <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Don dang van chuyen</p>
                                    <h2 class="mb-0" th:text="${shippingOrders}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Don hoan tat</p>
                                    <h2 class="mb-0" th:text="${completedOrders}">0</h2>
                                </div>
                            </div>
                        </div>
                         <div class="col-12 col-md-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body">
                                    <p class="text-muted mb-2">Don da huy </p>
                                    <h2 class="mb-0" th:text="${cancelledOrders}">0</h2>
                                </div>
                            </div>
                        </div>
                    </div>

                   
                </div>
            </div>
        </div>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script th:src="@{/admin/js/scripts.js}" src="/admin/js/scripts.js"></script>
    </body>
</html>
