<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>THEM SAN PHAM</title>
        <link rel="icon" type="image/x-icon" th:href="@{/admin/assets/favicon.ico}" href="/admin/assets/favicon.ico" />
        <link th:href="@{/admin/css/styles.css}" href="/admin/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light">
                    <a href="/admin" class="text-decoration-none"> TRANG CHU ADMIN</a>
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/sanpham">Sản phẩm </a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/donhang">Đơn hàng</a>
                </div>
            </div>
            <div id="page-content-wrapper">
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="sidebarToggle"> Thu gọn </button>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                    </div>
                </nav>
                <div class="container-fluid py-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="mb-0">THEM SAN PHAM MOI</h1>
                        <a class="btn btn-outline-secondary" th:href="@{/admin/sanpham}">Ve danh sach</a>
                    </div>

                    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <strong>THONG TIN SAN PHAM</strong>
                        </div>
                        <div class="card-body">
                            <form class="row g-3" enctype="multipart/form-data" method="post" th:action="@{/admin/sanpham/them}" th:object="${productForm}">
                                <div class="col-12 col-md-6">
                                    <label class="form-label" for="newProductName">Ten san pham</label>
                                    <input class="form-control" id="newProductName" th:field="*{productName}" type="text" />
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label" for="newCategory">Danh muc</label>
                                    <select class="form-select" id="newCategory" th:field="*{categoryId}">
                                        <option value="">Khong chon</option>
                                        <option th:each="category : ${categories}" th:text="${category.categoryName}" th:value="${category.categoryId}"></option>
                                    </select>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label" for="newDescription">Mo ta</label>
                                    <textarea class="form-control" id="newDescription" rows="3" th:field="*{description}"></textarea>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label" for="newPrice">Gia</label>
                                    <input class="form-control" id="newPrice" min="0" step="0.01" th:field="*{price}" type="number" />
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label" for="newStock">Ton kho</label>
                                    <input class="form-control" id="newStock" min="0" th:field="*{stock}" type="number" />
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label" for="newImageFile">Hinh anh</label>
                                    <input class="form-control" id="newImageFile" name="imageFile" accept="image/*" type="file" />
                                </div>
                                <div class="col-12 d-flex justify-content-end gap-2">
                                    <a class="btn btn-outline-secondary" th:href="@{/admin/sanpham}">Huy</a>
                                    <button class="btn btn-success" type="submit">Them san pham</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/admin/js/scripts.js}" src="/admin/js/scripts.js"></script>
    </body>
</html>
