<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>SAN PHAM</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" th:href="@{/admin/assets/favicon.ico}" href="/admin/assets/favicon.ico" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link th:href="@{/admin/css/styles.css}" href="/admin/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <div class="d-flex" id="wrapper">
            <!-- Sidebar-->
            <div class="border-end bg-white" id="sidebar-wrapper">
                <div class="sidebar-heading border-bottom bg-light" >
                    <a href="/admin" class="text-decoration-none"> TRANG CHU ADMIN</a>
                </div>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/sanpham">Sản phẩm </a>
                    <a class="list-group-item list-group-item-action list-group-item-light p-3" href="/admin/donhang">Đơn hàng</a>
                </div>
            </div>
            <!-- Page content wrapper-->
            <div id="page-content-wrapper">
                <!-- Top navigation-->
                <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                    <div class="container-fluid">
                        <button class="btn btn-primary" id="sidebarToggle"> Thu gọn </button>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                       
                    </div>
                </nav>
                <!-- Page content-->
                <div class="container-fluid py-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="mb-0">QUAN LY SAN PHAM</h1>
                        <a class="btn btn-success" th:href="@{/admin/sanpham/them}">Them san pham moi</a>
                    </div>

                    <div class="alert alert-success" role="alert" th:if="${message}" th:text="${message}"></div>
                    <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <strong>TIM KIEM SAN PHAM</strong>
                        </div>
                        <div class="card-body">
                            <form class="row g-2 align-items-end" method="get" th:action="@{/admin/sanpham}">
                                <div class="col-12 col-md-8">
                                    <label class="form-label" for="keyword">Tu khoa</label>
                                    <input class="form-control" id="keyword" name="keyword" th:value="${keyword}" type="text" placeholder="Nhap ten san pham..." />
                                </div>
                                <div class="col-6 col-md-2 d-grid">
                                    <button class="btn btn-primary" type="submit">Tim</button>
                                </div>
                                <div class="col-6 col-md-2 d-grid">
                                    <a class="btn btn-outline-secondary" th:href="@{/admin/sanpham}">Bo loc</a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-4" th:if="${editingProduct != null}">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <strong>CHINH SUA SAN PHAM #<span th:text="${editingProduct.productId}">0</span></strong>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/sanpham(keyword=${keyword})}">Dong</a>
                        </div>
                        <div class="card-body">
                            <form class="row g-3" enctype="multipart/form-data" method="post" th:action="@{|/admin/sanpham/${editingProduct.productId}/capnhat|}">
                                <div class="col-12 col-md-6">
                                    <label class="form-label" for="editProductName">Ten san pham</label>
                                    <input class="form-control" id="editProductName" name="productName" required th:value="${editingProduct.productName}" type="text" />
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label" for="editCategory">Danh muc</label>
                                    <select class="form-select" id="editCategory" name="categoryId">
                                        <option value="">Khong chon</option>
                                        <option
                                            th:each="category : ${categories}"
                                            th:selected="${editingProduct.category != null and editingProduct.category.categoryId == category.categoryId}"
                                            th:text="${category.categoryName}"
                                            th:value="${category.categoryId}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label" for="editDescription">Mo ta</label>
                                    <textarea class="form-control" id="editDescription" name="description" rows="2" th:text="${editingProduct.description}"></textarea>
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label" for="editPrice">Gia</label>
                                    <input class="form-control" id="editPrice" min="0" name="price" required step="0.01" th:value="${editingProduct.price}" type="number" />
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label" for="editStock">Ton kho</label>
                                    <input class="form-control" id="editStock" min="0" name="stock" required th:value="${editingProduct.stock}" type="number" />
                                </div>
                                <div class="col-12 col-md-4">
                                    <label class="form-label" for="editImageFile">Hinh anh moi</label>
                                    <input class="form-control" id="editImageFile" name="imageFile" accept="image/*" type="file" />
                                    <small class="text-muted">Bo trong neu khong doi anh.</small>
                                </div>
                                <div class="col-12" th:if="${editingProduct.image != null}">
                                    <label class="form-label">Anh hien tai</label>
                                    <div>
                                        <img alt="Anh san pham" class="border rounded" style="height: 80px; object-fit: cover; width: 80px;" th:src="${editingProduct.image}" />
                                    </div>
                                </div>
                                <div class="col-12 d-flex justify-content-end gap-2">
                                    <a class="btn btn-outline-secondary" th:href="@{/admin/sanpham(keyword=${keyword})}">Huy</a>
                                    <button class="btn btn-primary" type="submit">Luu thay doi</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <strong>DANH SACH SAN PHAM</strong>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Ten san pham</th>
                                        <th>Danh muc</th>
                                        <th>Gia</th>
                                        <th>Ton kho</th>
                                        <th>Ngay tao</th>
                                        <th>Image</th>
                                        <th>Hanh dong</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(products)}">
                                        <td class="text-center py-4" colspan="8">Chua co san pham nao.</td>
                                    </tr>
                                    <tr th:each="product : ${products}">
                                        <td th:text="${product.productId}">1</td>
                                        <td th:text="${product.productName}">Ten san pham</td>
                                        <td th:text="${product.category != null ? product.category.categoryName : 'Khong co'}">Khong co</td>
                                        <td th:text="${product.price != null ? #numbers.formatDecimal(product.price, 1, 2) : '0.00'}">0.00</td>
                                        <td th:text="${product.stock}">0</td>
                                        <td th:text="${product.createdAt != null ? #temporals.format(product.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                                        <td>
                                            <img th:if="${product.image != null}" alt="Anh san pham" class="border rounded" style="height: 56px; object-fit: cover; width: 56px;" th:src="${product.image}" />
                                            <span th:if="${product.image == null}">-</span>
                                        </td>
                                        <td class="text-nowrap">
                                            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/sanpham(editId=${product.productId},keyword=${keyword})}">Sua</a>
                                            <form class="d-inline" method="post" onsubmit="return confirm('Ban co chac chan muon xoa san pham nay?');" th:action="@{|/admin/sanpham/${product.productId}/xoa|}">
                                                <button class="btn btn-sm btn-outline-danger" type="submit">Xoa</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script th:src="@{/admin/js/scripts.js}" src="/admin/js/scripts.js"></script>
    </body>
</html>
